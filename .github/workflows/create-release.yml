name: Create Release Pipeline

on:
  release:
    types: [published]

env:
  PROJECT_NAME: TimeTracker
  PROJECT_PATH: ./TimeTracker2/TimeTracker.csproj
  BUILD_PATH: ./TimeTracker2/bin/Release/net10.0-windows
  ZIP_NAME: TimeTracker.zip
  ISS_FILE: ./SetupInstaller.iss
  INSTALLER_PATH: ./Output/TimeTrackerSetup.exe

jobs:
  build-and-release:
    name: Pipeline to Release
    runs-on: windows-latest
    permissions:
      contents: write   # Required to create/update releases and upload assets

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build the project
        run: dotnet build ${{ env.PROJECT_PATH }} -c Release --no-restore

      - name: Zip the build folder
        run: |
          Compress-Archive -Path "${{ env.BUILD_PATH }}\*" -DestinationPath "${{ env.BUILD_PATH }}\${{ env.ZIP_NAME }}"

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Compile installer with Inno Setup
        run: iscc ${{ env.ISS_FILE }}

      - name: Upload zip and installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BUILD_PATH }}/${{ env.ZIP_NAME }}
            ${{ env.INSTALLER_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
